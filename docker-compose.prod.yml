services:
  astro-web:
    image: astro-web-prod:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astro_template_prod
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - astro_web_data:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NODE_ENV=production
    # Verificar que Nginx esté sirviendo tráfico (wget está disponible en Alpine)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # resources constraints recomendados
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  astro_web_data:
    name: astro_web_data
