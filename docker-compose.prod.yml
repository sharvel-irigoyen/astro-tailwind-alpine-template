services:
  astro-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astro_template_prod
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      - NODE_ENV=production
      # - API_URL=https://api.production.com # Fallará el build (fail-fast) si Astro requiere esto y no está presente
    # resources constraints recomendados
    deploy:
      resources:
        limits:
          memory: 128M
